services:
  - type: web
    name: exampilot
    env: node
    buildCommand: npm install && cd server && npm install && cd ../client && npm install && cd ../client && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: exampilot-secret-key-2024
      - key: DATABASE_URL
        fromDatabase:
          name: exampilot-db
          property: connectionString
    autoDeploy: true

databases:
  - name: exampilot-db
    plan: free
