services:
  - type: web
    name: exampilot
    env: node
    buildCommand: npm install && npm install --prefix server && cd client && npm install && npx vite build
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: exampilot-secret-key-2024
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: 
      - key: DB_NAME
        value: mock_exam_db
      - key: DB_PORT
        value: 3306
    autoDeploy: true

databases:
  - name: exampilot-mysql
    plan: free
    databaseName: mock_exam_db
    user: root
