services:
  - type: web
    name: exampilot
    env: node
    buildCommand: npm install && npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: exampilot-secret-key-2024
      - key: DATABASE_URL
        fromDatabase:
          name: exampilot-db
          property: connectionString
    autoDeploy: true

databases:
  - name: exampilot-db
    plan: free
