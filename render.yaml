services:
  - type: web
    name: exampilot
    env: node
    buildCommand: npm install && npm install --prefix server && cd client && npm install && npx vite build
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: exampilot-secret-key-2024
      - key: DATABASE_URL
        fromDatabase:
          name: exampilot-db
          property: connectionString
    autoDeploy: true

databases:
  - name: exampilot-db
    plan: free
